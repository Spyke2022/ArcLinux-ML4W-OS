# ============================================================
# Garuda Tools — Modo Flutuante por Padrão (estilo desktop)
# ============================================================

# Todas as janelas novas abrem flutuantes
windowrule = float, class:.*

# Tamanho e posição inicial razoáveis para janelas flutuantes
windowrule = size 700 480, class:.*
windowrule = center, class:.*

# Redimensionar com SUPER + botão direito do mouse
bindm = SUPER, mouse:273, resizewindow
# Mover com SUPER + botão esquerdo do mouse
bindm = SUPER, mouse:272, movewindow

# Alternar flutuante/tiling se precisar pontualmente
bind = SUPER SHIFT, SPACE, togglefloating,
