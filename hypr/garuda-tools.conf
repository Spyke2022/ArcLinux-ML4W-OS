# ============================================================
# Garuda Tools — Keybinds para Hyprland / ML4W
# ============================================================
# Arquivo: ~/.config/hypr/garuda-tools.conf
# Inclua no hyprland.conf com:
#   source = ~/.config/hypr/garuda-tools.conf

# ── Aplicativos ──────────────────────────────────────────────
$mod = SUPER

# Win+c → Chrome
bind = $mod, C, exec, google-chrome-stable || chromium || firefox

# Win+t → Terminal (kitty)
bind = $mod, T, exec, kitty

# Win+e → Thunar
bind = $mod, E, exec, nautilus

# Win+l → LibreOffice
bind = $mod, L, exec, libreoffice --startcenter

# Win+g → Configurações do Sistema
bind = $mod, G, exec, gnome-control-center || systemsettings5 || xfce4-settings-manager

# Win+f → Menu Forense Digital
bind = $mod, F, exec, kitty --title "Forense Digital" -- python3 ~/.local/share/garuda-sway-tools/garuda-forensics-menu.py

# Win+p → Menu Produtividade
bind = $mod, P, exec, kitty --title "Produtividade" -- python3 ~/.local/share/garuda-sway-tools/garuda-productivity-menu.py

# ── Foco por título de janela ─────────────────────────────────
bind = $mod SHIFT, F, focuswindow, title:Forense Digital
bind = $mod SHIFT, P, focuswindow, title:Produtividade

# ── Redimensionamento manual ──────────────────────────────────
# Win+r → ativa modo resize (pressione setas ou hjkl para redimensionar)
# (ML4W já tem resize nativo; estas são teclas extras)
binde = $mod, right, resizeactive, 40 0
binde = $mod, left,  resizeactive, -40 0
binde = $mod, up,    resizeactive, 0 -40
binde = $mod, down,  resizeactive, 0 40

# ── Floating toggle ───────────────────────────────────────────
bind = $mod SHIFT, SPACE, togglefloating,

# ── Autostart do grid manager ─────────────────────────────────
# exec-once = python3 ~/.local/share/garuda-sway-tools/garuda-grid-manager.py





# ── Screenshots ──
unbind = , Print
unbind = SUPER, Print
bind = , Print, exec, /home/silas/.local/share/garuda-sway-tools/screenshot.sh
bind = SUPER, Print, exec, /home/silas/.local/share/garuda-sway-tools/screenshot.sh area
